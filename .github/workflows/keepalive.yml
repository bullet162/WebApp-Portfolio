name: Keep Alive

permissions:
  contents: read

on:
  schedule:
    # Every 10 minutes, Mon–Fri 6pm–10pm PHT (UTC+8)
    # PHT 6:00pm = UTC 10:00, PHT 10:00pm = UTC 14:00
    - cron: '0/10 10-13 * * 1-5'       # Mon–Fri 10:00–13:59 UTC (6pm–9:59pm PHT)
    - cron: '0,10,20,30,40,50 14 * * 1-5' # Mon–Fri 14:00–14:50 UTC (10pm PHT cutoff)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging at $(date -u)"
          curl -fsS --max-time 30 https://jherson.onrender.com/health \
            && echo "OK" \
            || echo "Ping failed (app may be cold starting)"
