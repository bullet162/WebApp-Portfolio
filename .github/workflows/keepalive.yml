name: Keep Alive

permissions:
  contents: read

on:
  schedule:
    # Every 14 minutes, Mon–Fri 6am–12am PHT (UTC+8)
    # PHT 6:00am = UTC 22:00 (prev day), PHT 12:00am = UTC 16:00
    # Runs UTC: Sun–Thu 22:00 → Fri–Thu 16:00  (covers Mon–Fri PHT window)
    - cron: '0/14 22-23 * * 0-4'   # Sun–Thu 22:00–23:59 UTC  (Mon–Fri 6am–7:59am PHT)
    - cron: '0/14 0-15 * * 1-5'    # Mon–Fri 00:00–15:59 UTC  (Mon–Fri 8am–11:59pm PHT)
    - cron: '0,14,28,42,56 16 * * 1-5' # Mon–Fri 16:00–16:56 UTC (Fri 12:00am PHT cutoff)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging at $(date -u)"
          curl -fsS --max-time 30 https://jherson.onrender.com/health \
            && echo "OK" \
            || echo "Ping failed (app may be cold starting)"
